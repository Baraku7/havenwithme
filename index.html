<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Haven — Your Safe Place, Always Here</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#0D0D12;
  --ink2:#1E1E2E;
  --ink3:#2D2D42;
  --slate:#6B6B8A;
  --mist:#A8A8C0;
  --fog:#E8E8F0;
  --snow:#F5F5FA;
  --white:#FFFFFF;
  --haven:#5B4FE8;
  --haven2:#7B6FF0;
  --haven3:#A89CF7;
  --haven4:#EAE8FD;
  --teal:#2EC4B6;
  --teal2:#E8FAF9;
  --gold:#F4A261;
  --gold2:#FFF0E6;
  --rose:#E84F7B;
  --rose2:#FEE8EF;
  --green:#2DC653;
  --red:#E84F4F;
  --r:16px;
  --r2:24px;
  --r3:32px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
html{scroll-behavior:smooth;height:100%;}
body{font-family:'Inter',sans-serif;background:var(--snow);color:var(--ink);overflow-x:hidden;height:100%;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--haven3);border-radius:2px;}

/* ── PAGES ── */
.page{display:none;min-height:100vh;flex-direction:column;}
.page.active{display:flex;}

/* ════════════════════════════════
   LANDING
════════════════════════════════ */
#landing{
  background:#0D0D12;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}
.land-glow{
  position:absolute;
  border-radius:50%;
  filter:blur(120px);
  pointer-events:none;
}
.land-glow1{width:600px;height:600px;background:rgba(91,79,232,0.35);top:-200px;right:-100px;}
.land-glow2{width:500px;height:500px;background:rgba(46,196,182,0.2);bottom:-150px;left:-100px;}
.land-glow3{width:300px;height:300px;background:rgba(244,162,97,0.15);top:40%;left:30%;}

.land-nav{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:28px 48px;
}
.land-logo{
  font-family:'Fraunces',serif;
  font-size:22px;font-weight:500;
  color:var(--white);letter-spacing:-0.02em;
  display:flex;align-items:center;gap:8px;
}
.land-logo-dot{
  width:8px;height:8px;border-radius:50%;
  background:linear-gradient(135deg,var(--haven),var(--teal));
}
.land-nav-right{display:flex;align-items:center;gap:16px;}
.land-pill{
  font-size:13px;font-weight:500;color:rgba(255,255,255,0.6);
  border:1px solid rgba(255,255,255,0.12);
  padding:9px 20px;border-radius:100px;
  cursor:pointer;transition:all 0.2s;letter-spacing:-0.01em;
  background:rgba(255,255,255,0.04);
}
.land-pill:hover{background:rgba(255,255,255,0.1);color:var(--white);}
.land-pill-filled{
  font-size:13px;font-weight:500;color:var(--ink);
  background:var(--white);
  padding:9px 20px;border-radius:100px;
  cursor:pointer;transition:all 0.2s;letter-spacing:-0.01em;border:none;
  font-family:'Inter',sans-serif;
}
.land-pill-filled:hover{background:var(--haven4);transform:translateY(-1px);}

.land-hero{
  position:relative;z-index:5;
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:60px 24px 100px;
}
.land-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(91,79,232,0.15);
  border:1px solid rgba(91,79,232,0.3);
  border-radius:100px;padding:6px 16px;
  margin-bottom:32px;
  animation:fadeUp 0.8s ease both;
}
.land-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--haven3);}
.land-badge-text{font-size:12px;color:var(--haven3);font-weight:500;letter-spacing:0.02em;}

.land-h1{
  font-family:'Fraunces',serif;
  font-size:clamp(48px,8vw,96px);
  font-weight:300;line-height:1.0;
  color:var(--white);
  letter-spacing:-0.04em;
  margin-bottom:24px;
  animation:fadeUp 0.8s 0.1s ease both;
}
.land-h1 em{font-style:italic;color:var(--haven3);}
.land-h1 .line2{display:block;color:rgba(255,255,255,0.4);}

.land-sub{
  font-size:clamp(15px,1.8vw,18px);
  color:rgba(255,255,255,0.45);
  max-width:440px;line-height:1.7;
  margin-bottom:48px;
  font-weight:300;
  animation:fadeUp 0.8s 0.2s ease both;
  letter-spacing:-0.01em;
}

.land-cta-row{
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
  animation:fadeUp 0.8s 0.3s ease both;
}
.land-cta-primary{
  font-family:'Inter',sans-serif;
  font-size:15px;font-weight:600;
  color:var(--ink);background:var(--white);
  padding:16px 36px;border-radius:100px;
  border:none;cursor:pointer;
  transition:all 0.25s;letter-spacing:-0.02em;
}
.land-cta-primary:hover{background:var(--haven4);transform:translateY(-2px);box-shadow:0 20px 40px rgba(91,79,232,0.3);}
.land-cta-ghost{
  font-family:'Inter',sans-serif;
  font-size:15px;font-weight:500;
  color:rgba(255,255,255,0.6);
  background:rgba(255,255,255,0.06);
  padding:16px 36px;border-radius:100px;
  border:1px solid rgba(255,255,255,0.1);
  cursor:pointer;transition:all 0.25s;letter-spacing:-0.02em;
}
.land-cta-ghost:hover{background:rgba(255,255,255,0.1);color:var(--white);}

.land-stats{
  display:flex;gap:48px;flex-wrap:wrap;justify-content:center;
  margin-top:72px;
  animation:fadeUp 0.8s 0.4s ease both;
}
.land-stat{display:flex;flex-direction:column;align-items:center;gap:4px;}
.land-stat-num{
  font-family:'Fraunces',serif;
  font-size:32px;font-weight:400;
  color:var(--white);letter-spacing:-0.03em;
}
.land-stat-label{font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:0.04em;text-transform:uppercase;}

.land-cards{
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
  margin-top:64px;padding:0 24px;
  animation:fadeUp 0.8s 0.5s ease both;
}
.land-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;padding:20px 24px;
  display:flex;align-items:center;gap:14px;
  backdrop-filter:blur(20px);
  transition:all 0.2s;
}
.land-card:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.15);}
.land-card-icon{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.land-card-title{font-size:14px;font-weight:500;color:rgba(255,255,255,0.85);letter-spacing:-0.01em;}
.land-card-sub{font-size:12px;color:rgba(255,255,255,0.35);margin-top:2px;}

/* Wave divider */
.land-wave{
  position:absolute;bottom:0;left:0;right:0;
  z-index:6;line-height:0;
}

/* ════════════════════════════════
   ONBOARDING
════════════════════════════════ */
#onboarding{
  background:var(--ink);
  min-height:100vh;
  flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;
}
#onboarding.active{display:flex;}
.ob-wrap{width:100%;max-width:400px;}
.ob-logo-wrap{text-align:center;margin-bottom:40px;}
.ob-logo{
  font-family:'Fraunces',serif;
  font-size:28px;font-weight:400;color:var(--white);
  letter-spacing:-0.03em;
  display:inline-flex;align-items:center;gap:8px;
}
.ob-logo-dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--haven),var(--teal));}
.ob-tagline{font-size:13px;color:var(--slate);margin-top:6px;}
.ob-title{
  font-family:'Fraunces',serif;
  font-size:28px;font-weight:400;
  color:var(--white);letter-spacing:-0.03em;
  margin-bottom:8px;
}
.ob-sub{font-size:14px;color:var(--slate);margin-bottom:28px;line-height:1.6;}
.ob-field{
  width:100%;padding:14px 18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;font-size:14px;
  font-family:'Inter',sans-serif;
  color:var(--white);outline:none;
  margin-bottom:10px;transition:border-color 0.2s;
}
.ob-field:focus{border-color:var(--haven);}
.ob-field::placeholder{color:var(--slate);}
.ob-btn{
  width:100%;padding:15px;
  background:var(--haven);color:var(--white);
  border:none;border-radius:14px;
  font-size:15px;font-weight:600;
  font-family:'Inter',sans-serif;
  cursor:pointer;transition:all 0.2s;
  letter-spacing:-0.02em;margin-top:4px;
}
.ob-btn:hover{background:var(--haven2);transform:translateY(-1px);}
.ob-divider{
  display:flex;align-items:center;gap:12px;
  margin:20px 0;
}
.ob-divider-line{flex:1;height:1px;background:rgba(255,255,255,0.08);}
.ob-divider-text{font-size:12px;color:var(--slate);}
.ob-social{
  width:100%;padding:13px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;font-size:14px;
  font-family:'Inter',sans-serif;color:rgba(255,255,255,0.8);
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:10px;margin-bottom:10px;
  transition:all 0.2s;
}
.ob-social:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.2);}
.ob-terms{
  font-size:11px;color:var(--slate);
  text-align:center;margin-top:20px;line-height:1.6;
}
.ob-link{color:var(--haven3);text-decoration:none;}
.ob-switch{
  font-size:13px;color:var(--slate);
  text-align:center;margin-top:20px;cursor:pointer;
}
.ob-switch span{color:var(--haven3);}

/* ════════════════════════════════
   APP SHELL
════════════════════════════════ */
#app{background:var(--snow);flex-direction:column;min-height:100vh;}
#app.active{display:flex;}

.app-nav{
  background:rgba(245,245,250,0.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,0,0,0.06);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:64px;
  position:sticky;top:0;z-index:100;
}
.app-nav-logo{
  font-family:'Fraunces',serif;
  font-size:20px;font-weight:400;color:var(--ink);
  letter-spacing:-0.03em;
  display:flex;align-items:center;gap:8px;
}
.app-nav-logo-dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--haven),var(--teal));}
.app-nav-tabs{display:flex;gap:2px;}
.nav-tab{
  padding:8px 18px;border-radius:100px;
  font-size:13px;font-weight:500;color:var(--slate);
  cursor:pointer;border:none;background:transparent;
  font-family:'Inter',sans-serif;
  transition:all 0.2s;letter-spacing:-0.01em;
}
.nav-tab.active{background:var(--haven4);color:var(--haven);}
.nav-tab:hover:not(.active){background:var(--fog);color:var(--ink);}
.app-nav-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--haven),var(--teal));
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;font-weight:600;color:var(--white);
  letter-spacing:-0.01em;
}

.app-body{flex:1;position:relative;}
.tab-panel{display:none;min-height:calc(100vh - 64px);padding-bottom:100px;animation:fadeIn 0.25s ease;}
.tab-panel.active{display:block;}

/* ════════════════════════════════
   HOME TAB
════════════════════════════════ */
.home-wrap{max-width:560px;margin:0 auto;padding:32px 20px;}

.home-greeting{
  background:linear-gradient(135deg,var(--ink) 0%,var(--ink2) 50%,var(--ink3) 100%);
  border-radius:var(--r3);padding:32px;
  margin-bottom:20px;position:relative;overflow:hidden;
}
.home-greeting-glow{
  position:absolute;width:250px;height:250px;
  border-radius:50%;background:var(--haven);
  filter:blur(80px);opacity:0.2;
  top:-60px;right:-60px;pointer-events:none;
}
.home-greeting-glow2{
  position:absolute;width:150px;height:150px;
  border-radius:50%;background:var(--teal);
  filter:blur(60px);opacity:0.15;
  bottom:-40px;left:40px;pointer-events:none;
}
.home-greeting-top{
  display:flex;align-items:center;gap:12px;
  margin-bottom:20px;position:relative;
}
.home-greeting-icon{
  width:44px;height:44px;border-radius:14px;
  background:rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.home-greeting-name{font-size:16px;font-weight:500;color:var(--white);letter-spacing:-0.02em;}
.home-greeting-time{font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px;}
.home-greeting-msg{
  font-family:'Fraunces',serif;
  font-size:20px;font-weight:300;font-style:italic;
  color:rgba(255,255,255,0.9);line-height:1.5;
  position:relative;letter-spacing:-0.02em;
}

.home-mood{
  background:var(--white);border-radius:var(--r2);
  padding:24px;margin-bottom:16px;
  border:1px solid rgba(0,0,0,0.05);
}
.home-section-label{
  font-size:11px;font-weight:600;color:var(--mist);
  letter-spacing:0.08em;text-transform:uppercase;margin-bottom:16px;
}
.mood-row{display:flex;gap:8px;}
.mood-btn{
  flex:1;border:1.5px solid var(--fog);
  border-radius:14px;padding:14px 8px;
  text-align:center;cursor:pointer;
  transition:all 0.2s;background:var(--snow);
}
.mood-btn:hover,.mood-btn.active{
  border-color:var(--haven);
  background:var(--haven4);
}
.mood-emoji{font-size:24px;display:block;margin-bottom:6px;}
.mood-label{font-size:11px;color:var(--slate);font-weight:500;}

.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.home-card{
  background:var(--white);border-radius:var(--r2);
  padding:20px;cursor:pointer;
  border:1px solid rgba(0,0,0,0.05);
  transition:all 0.2s;
  display:flex;flex-direction:column;gap:10px;
}
.home-card:hover{transform:translateY(-3px);box-shadow:0 16px 32px rgba(0,0,0,0.08);border-color:rgba(0,0,0,0.0);}
.home-card-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.home-card-title{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-0.02em;}
.home-card-sub{font-size:12px;color:var(--slate);}

.crisis-strip{
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  border-radius:var(--r2);padding:18px 20px;
  display:flex;align-items:center;gap:14px;
  margin-bottom:12px;
}
.crisis-icon{font-size:22px;}
.crisis-text{flex:1;font-size:13px;color:rgba(255,255,255,0.75);line-height:1.5;}
.crisis-text strong{color:var(--white);}
.crisis-btn-grp{display:flex;gap:6px;margin-top:10px;}
.crisis-pill{
  font-size:11px;font-weight:600;padding:7px 14px;
  border-radius:100px;border:none;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all 0.15s;
}
.crisis-pill-primary{background:var(--rose);color:var(--white);}
.crisis-pill-primary:hover{background:#d43a68;}
.crisis-pill-ghost{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);}
.crisis-pill-ghost:hover{background:rgba(255,255,255,0.18);}

/* ════════════════════════════════
   CHAT TAB
════════════════════════════════ */
.chat-shell{display:flex;flex-direction:column;height:calc(100vh - 64px);}
.chat-top{
  padding:16px 24px;
  background:rgba(245,245,250,0.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,0,0,0.05);
  display:flex;align-items:center;gap:14px;
}
.chat-top-avatar{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--haven),var(--teal));
  display:flex;align-items:center;justify-content:center;font-size:18px;
  position:relative;flex-shrink:0;
}
.chat-top-online{
  position:absolute;bottom:1px;right:1px;
  width:10px;height:10px;border-radius:50%;
  background:var(--green);border:2px solid var(--snow);
}
.chat-top-name{font-size:15px;font-weight:600;color:var(--ink);letter-spacing:-0.02em;}
.chat-top-status{font-size:12px;color:var(--green);margin-top:1px;}
.chat-top-voice{
  margin-left:auto;
  background:var(--haven4);color:var(--haven);
  border:none;border-radius:100px;
  padding:7px 16px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:'Inter',sans-serif;
  transition:all 0.2s;
}

.chat-msgs{
  flex:1;overflow-y:auto;
  padding:24px 20px;
  display:flex;flex-direction:column;gap:16px;
  background:var(--snow);
}
.msg-row{display:flex;flex-direction:column;}
.msg-row.user{align-items:flex-end;}
.msg-row.ai{align-items:flex-start;}
.msg-row.ai .bubble-wrap{display:flex;gap:10px;align-items:flex-end;}
.ai-avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--haven),var(--teal));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;
}
.bubble{
  max-width:76%;padding:13px 17px;
  font-size:14px;line-height:1.65;
  letter-spacing:-0.01em;
}
.bubble.ai{
  background:var(--white);color:var(--ink);
  border-radius:20px 20px 20px 6px;
  border:1px solid rgba(0,0,0,0.06);
  box-shadow:0 2px 12px rgba(0,0,0,0.04);
}
.bubble.user{
  background:linear-gradient(135deg,var(--haven),var(--haven2));
  color:var(--white);
  border-radius:20px 20px 6px 20px;
}
.msg-time{font-size:10px;color:var(--mist);margin-top:5px;padding:0 4px;}
.typing-wrap{display:flex;gap:10px;align-items:flex-end;}
.typing-bubble{
  background:var(--white);border-radius:20px 20px 20px 6px;
  border:1px solid rgba(0,0,0,0.06);
  padding:14px 18px;
}
.typing-dots{display:flex;gap:4px;align-items:center;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--mist);animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:0.15s;}
.dot:nth-child(3){animation-delay:0.3s;}

.chat-qr{
  display:flex;gap:6px;flex-wrap:wrap;
  padding:12px 20px 0;background:var(--snow);
}
.qr{
  font-size:12px;font-weight:500;color:var(--haven);
  border:1.5px solid var(--haven4);
  border-radius:100px;padding:7px 16px;
  cursor:pointer;background:var(--white);
  transition:all 0.15s;
}
.qr:hover{background:var(--haven4);border-color:var(--haven);}

.chat-input{
  padding:12px 16px 28px;
  background:rgba(245,245,250,0.95);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,0,0,0.06);
}
.chat-input-row{
  display:flex;gap:10px;align-items:flex-end;
  background:var(--white);
  border:1.5px solid var(--fog);
  border-radius:20px;padding:8px 8px 8px 18px;
  transition:border-color 0.2s;
}
.chat-input-row:focus-within{border-color:var(--haven);}
.chat-textarea{
  flex:1;background:transparent;border:none;
  outline:none;font-size:14px;
  font-family:'Inter',sans-serif;color:var(--ink);
  resize:none;max-height:100px;line-height:1.5;
  padding:6px 0;
}
.chat-textarea::placeholder{color:var(--mist);}
.send-btn{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--haven),var(--haven2));
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;
}
.send-btn:hover{transform:scale(1.05);box-shadow:0 8px 20px rgba(91,79,232,0.4);}

}

  position:absolute;width:300px;height:300px;
  border-radius:50%;

  width:160px;height:160px;border-radius:50%;

  transition:all 1s cubic-bezier(0.4,0,0.2,1);
}

  content:'';position:absolute;inset:-12px;
  border-radius:50%;border:1px solid rgba(91,79,232,0.1);

  width:120px;height:120px;border-radius:50%;
  background:rgba(91,79,232,0.15);

  cursor:pointer;
  transition:all 1s cubic-bezier(0.4,0,0.2,1);
}

  transform:scale(1.2);
  background:rgba(91,79,232,0.3);
  border-color:rgba(91,79,232,0.8);
  box-shadow:0 0 40px rgba(91,79,232,0.4);
}
